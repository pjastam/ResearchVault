<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono','Fira Code','Courier New',monospace">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#162033"/>
    </linearGradient>
    <linearGradient id="card1-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(74,158,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(74,158,255,0.04)"/>
    </linearGradient>
    <linearGradient id="card2-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(46,204,154,0.12)"/>
      <stop offset="100%" stop-color="rgba(46,204,154,0.04)"/>
    </linearGradient>
    <linearGradient id="card3-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(157,121,224,0.12)"/>
      <stop offset="100%" stop-color="rgba(157,121,224,0.04)"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle dot grid decoration -->
  <g fill="rgba(255,255,255,0.04)">
    <circle cx="80" cy="80" r="1.5"/><circle cx="160" cy="80" r="1.5"/><circle cx="240" cy="80" r="1.5"/>
    <circle cx="960" cy="80" r="1.5"/><circle cx="1040" cy="80" r="1.5"/><circle cx="1120" cy="80" r="1.5"/>
    <circle cx="80" cy="550" r="1.5"/><circle cx="160" cy="550" r="1.5"/><circle cx="240" cy="550" r="1.5"/>
    <circle cx="960" cy="550" r="1.5"/><circle cx="1040" cy="550" r="1.5"/><circle cx="1120" cy="550" r="1.5"/>
  </g>

  <!-- ── HEADLINE ── -->
  <text x="600" y="72" text-anchor="middle" fill="rgba(255,255,255,0.95)" font-size="46" font-weight="700">Too much to read. Here's my system.</text>
  <text x="600" y="116" text-anchor="middle" fill="rgba(255,255,255,0.48)" font-size="19" font-weight="400">A privacy-first research workflow — AI reads for you, your research never leaves your device.</text>

  <!-- Divider -->
  <line x1="440" y1="140" x2="760" y2="140" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>

  <!-- ── CARD 1: GATHER (blue) ── x=85, width=300, center=235 -->
  <rect x="85" y="162" width="300" height="278" rx="14" fill="url(#card1-bg)" stroke="rgba(74,158,255,0.4)" stroke-width="1"/>
  <!-- Number circle -->
  <circle cx="235" cy="220" r="28" fill="rgba(74,158,255,0.15)" stroke="rgba(74,158,255,0.6)" stroke-width="1.5"/>
  <text x="235" y="228" text-anchor="middle" fill="#4a9eff" font-size="22" font-weight="700">1</text>
  <!-- Verb -->
  <text x="235" y="284" text-anchor="middle" fill="#4a9eff" font-size="24" font-weight="700" letter-spacing="0.14em">GATHER</text>
  <!-- Description -->
  <text x="235" y="322" text-anchor="middle" fill="rgba(255,255,255,0.82)" font-size="15" font-weight="500">Papers, videos, podcasts,</text>
  <text x="235" y="344" text-anchor="middle" fill="rgba(255,255,255,0.82)" font-size="15" font-weight="500">websites — all in one inbox.</text>
  <!-- Tool badge -->
  <rect x="175" y="398" width="120" height="24" rx="12" fill="rgba(74,158,255,0.15)" stroke="rgba(74,158,255,0.3)" stroke-width="0.75"/>
  <text x="235" y="414" text-anchor="middle" fill="rgba(74,158,255,0.85)" font-size="12" font-weight="700" letter-spacing="0.08em">via Zotero</text>

  <!-- Arrow 1→2 -->
  <line x1="392" y1="301" x2="413" y2="301" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── CARD 2: SUMMARIZE (teal) ── x=450, width=300, center=600 -->
  <rect x="450" y="162" width="300" height="278" rx="14" fill="url(#card2-bg)" stroke="rgba(46,204,154,0.4)" stroke-width="1"/>
  <circle cx="600" cy="220" r="28" fill="rgba(46,204,154,0.15)" stroke="rgba(46,204,154,0.6)" stroke-width="1.5"/>
  <text x="600" y="228" text-anchor="middle" fill="#2ecc9a" font-size="22" font-weight="700">2</text>
  <text x="600" y="284" text-anchor="middle" fill="#2ecc9a" font-size="24" font-weight="700" letter-spacing="0.14em">SUMMARISE</text>
  <text x="600" y="322" text-anchor="middle" fill="rgba(255,255,255,0.82)" font-size="15" font-weight="500">Local AI extracts insights —</text>
  <text x="600" y="344" text-anchor="middle" fill="rgba(255,255,255,0.82)" font-size="15" font-weight="500">on your laptop, not the cloud.</text>
  <rect x="528" y="398" width="144" height="24" rx="12" fill="rgba(46,204,154,0.15)" stroke="rgba(46,204,154,0.3)" stroke-width="0.75"/>
  <text x="600" y="414" text-anchor="middle" fill="rgba(46,204,154,0.85)" font-size="12" font-weight="700" letter-spacing="0.08em">via Local AI</text>

  <!-- Arrow 2→3 -->
  <line x1="757" y1="301" x2="778" y2="301" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── CARD 3: BUILD (purple) ── x=815, width=300, center=965 -->
  <rect x="815" y="162" width="300" height="278" rx="14" fill="url(#card3-bg)" stroke="rgba(157,121,224,0.4)" stroke-width="1"/>
  <circle cx="965" cy="220" r="28" fill="rgba(157,121,224,0.15)" stroke="rgba(157,121,224,0.6)" stroke-width="1.5"/>
  <text x="965" y="228" text-anchor="middle" fill="#9d79e0" font-size="22" font-weight="700">3</text>
  <text x="965" y="284" text-anchor="middle" fill="#9d79e0" font-size="24" font-weight="700" letter-spacing="0.14em">BUILD</text>
  <text x="965" y="322" text-anchor="middle" fill="rgba(255,255,255,0.82)" font-size="15" font-weight="500">A searchable knowledge base</text>
  <text x="965" y="344" text-anchor="middle" fill="rgba(255,255,255,0.82)" font-size="15" font-weight="500">that grows with you.</text>
  <rect x="893" y="398" width="144" height="24" rx="12" fill="rgba(157,121,224,0.15)" stroke="rgba(157,121,224,0.3)" stroke-width="0.75"/>
  <text x="965" y="414" text-anchor="middle" fill="rgba(157,121,224,0.85)" font-size="12" font-weight="700" letter-spacing="0.08em">via Obsidian</text>

  <!-- ── FOOTER ── -->
  <!-- Lock icon + text centered as a unit around x=600 -->
  <rect x="220" y="476" width="18" height="14" rx="3" fill="none" stroke="rgba(46,204,154,0.7)" stroke-width="1.5"/>
  <path d="M224 476 v-5 a5 5 0 0 1 10 0 v5" fill="none" stroke="rgba(46,204,154,0.7)" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="229" cy="483" r="2" fill="rgba(46,204,154,0.7)"/>

  <text x="615" y="488" text-anchor="middle" fill="rgba(46,204,154,0.85)" font-size="14" font-weight="700">Your research stays on your device. Local AI is free. No research data sent to the cloud.</text>

  <!-- Tagline -->
  <text x="600" y="536" text-anchor="middle" fill="rgba(255,255,255,0.28)" font-size="13" font-weight="500" letter-spacing="0.12em">ZOTERO  ·  OLLAMA  ·  OBSIDIAN  ·  PRIVACY-FIRST</text>
</svg>
