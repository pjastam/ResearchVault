      .panel-priv { fill: rgba(255,255,255,0.02); stroke: rgba(255,255,255,0.08); stroke-width: 0.5; }
      .card-1 { fill: rgba(74,158,255,0.08); stroke: rgba(74,158,255,0.2); stroke-width: 0.5; }
      .card-1d { fill: rgba(74,158,255,0.04); stroke: rgba(74,158,255,0.18); stroke-width: 0.5; stroke-dasharray: 4 3; }
      .card-1i { fill: rgba(74,158,255,0.04); stroke: rgba(74,158,255,0.12); stroke-width: 0.5; }
