<svg width="600" height="165" viewBox="0 0 600 165" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono','Fira Code','Courier New',monospace">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="600" height="165" fill="#1c2128"/>

  <!-- Step 1: CAPTURE -->
  <rect x="40" y="12" width="140" height="100" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.32)" stroke-width="0.75"/>
  <!-- Circle badge 1 — 20px inset from top-left corner -->
  <circle cx="60" cy="32" r="13" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="0.75"/>
  <text x="60" y="37" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="13" font-weight="700">1</text>
  <!-- Label -->
  <text x="110" y="72" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="14" font-weight="700" letter-spacing="0.16em">CAPTURE</text>

  <!-- Arrow 1→2 -->
  <line x1="182" y1="62" x2="218" y2="62" stroke="rgba(255,255,255,0.55)" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Step 2: FILTER -->
  <rect x="220" y="12" width="140" height="100" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.32)" stroke-width="0.75"/>
  <!-- Circle badge 2 -->
  <circle cx="240" cy="32" r="13" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="0.75"/>
  <text x="240" y="37" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="13" font-weight="700">2</text>
  <!-- Label -->
  <text x="290" y="72" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="14" font-weight="700" letter-spacing="0.16em">FILTER</text>

  <!-- Arrow 2→3 -->
  <line x1="362" y1="62" x2="398" y2="62" stroke="rgba(255,255,255,0.55)" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Step 3: PROCESS -->
  <rect x="400" y="12" width="140" height="100" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.32)" stroke-width="0.75"/>
  <!-- Circle badge 3 -->
  <circle cx="420" cy="32" r="13" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="0.75"/>
  <text x="420" y="37" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="13" font-weight="700">3</text>
  <!-- Label -->
  <text x="470" y="72" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="14" font-weight="700" letter-spacing="0.16em">PROCESS</text>

  <!-- Footer: title — spans x=40 to x=540 -->
  <text x="290" y="132" text-anchor="middle" textLength="500" lengthAdjust="spacing" fill="rgba(255,255,255,0.75)" font-size="13" font-weight="700">PRIVACY-FIRST RESEARCH FLOW</text>
  <!-- Footer: subtitle — spans x=40 to x=540 -->
  <text x="290" y="152" text-anchor="middle" textLength="500" lengthAdjust="spacing" fill="rgba(255,255,255,0.45)" font-size="11" font-weight="700">ZOTERO · LOCAL AI · OBSIDIAN</text>
</svg>
